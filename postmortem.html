<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交易复盘 — Post-Mortem</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    /* ── Header ── */
    .header { margin-bottom: 32px; }
    .header h1 { font-size: 22px; font-weight: 600; color: #f0f6fc; margin-bottom: 6px; }
    .header p  { font-size: 13px; color: #8b949e; }

    /* ── Controls ── */
    .controls {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px; flex-wrap: wrap;
    }

    .period-group { display: flex; gap: 6px; }
    .period-btn {
      padding: 6px 16px; border-radius: 6px; border: 1px solid #30363d;
      background: #161b22; color: #8b949e; font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .period-btn:hover  { border-color: #58a6ff; color: #58a6ff; }
    .period-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

    .generate-btn {
      padding: 7px 22px; border-radius: 6px; border: none;
      background: #238636; color: #fff; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 8px;
    }
    .generate-btn:hover    { background: #2ea043; }
    .generate-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    .generate-btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats row ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 14px 16px;
    }
    .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 600; color: #f0f6fc; }
    .stat-value.pos { color: #3fb950; }
    .stat-value.neg { color: #f85149; }

    /* ── Trade tables ── */
    .trades-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .trade-group h3 {
      font-size: 13px; font-weight: 600; padding: 10px 14px;
      border-radius: 6px 6px 0 0; border: 1px solid;
    }
    .trade-group.winners h3 { background: rgba(63,185,80,0.1);  border-color: #238636; color: #3fb950; }
    .trade-group.losers  h3 { background: rgba(248,81,73,0.1);  border-color: #da3633; color: #f85149; }

    .trade-list { border: 1px solid #30363d; border-top: none; border-radius: 0 0 6px 6px; }
    .trade-item {
      padding: 12px 14px; border-bottom: 1px solid #21262d; font-size: 12px;
    }
    .trade-item:last-child { border-bottom: none; }
    .trade-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .trade-symbol { font-weight: 600; font-size: 14px; color: #f0f6fc; }
    .trade-pnl { font-weight: 600; font-size: 14px; }
    .trade-pnl.pos { color: #3fb950; }
    .trade-pnl.neg { color: #f85149; }
    .trade-meta { color: #8b949e; line-height: 1.5; }
    .trade-reason {
      margin-top: 6px; padding: 7px 10px; background: #0d1117;
      border-left: 2px solid #30363d; border-radius: 0 4px 4px 0;
      color: #8b949e; font-size: 11px; line-height: 1.5;
      max-height: 80px; overflow-y: auto;
    }
    .live-tag {
      display: inline-block; font-size: 10px; padding: 1px 6px;
      border-radius: 10px; background: #1f6feb22; color: #58a6ff;
      border: 1px solid #1f6feb55; margin-left: 6px;
    }

    /* ── Analysis ── */
    .analysis-card {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 24px; margin-bottom: 28px;
    }
    .analysis-card h2 {
      font-size: 14px; font-weight: 600; color: #f0f6fc; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .analysis-body {
      font-size: 13px; line-height: 1.8; color: #c9d1d9;
      white-space: pre-wrap;
    }
    .analysis-body h2, .analysis-body h3 {
      color: #f0f6fc; font-size: 13px; font-weight: 600;
      margin: 14px 0 6px; border-bottom: 1px solid #21262d; padding-bottom: 4px;
    }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center; padding: 60px 24px; color: #484f58;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .error-msg {
      background: rgba(248,81,73,0.1); border: 1px solid #da3633;
      border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #f85149;
      margin-bottom: 20px;
    }

    /* ── Footer ── */
    .footer { text-align: center; padding-top: 20px; color: #484f58; font-size: 12px; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>交易复盘 Post-Mortem</h1>
    <p>AI 自动分析本周交易表现，识别 Prompt 漏洞，提出改进建议</p>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="period-group">
      <button class="period-btn active" data-days="7">本周 7d</button>
      <button class="period-btn" data-days="14">双周 14d</button>
      <button class="period-btn" data-days="30">本月 30d</button>
      <button class="period-btn" data-days="90">本季 90d</button>
    </div>
    <button class="generate-btn" id="generateBtn" onclick="generate()">
      <div class="spinner"></div>
      <span id="btnText">生成复盘</span>
    </button>
    <span id="lastGenTime" style="font-size:12px;color:#484f58;"></span>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-card">
      <div class="stat-label">总交易数</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">有 PnL 数据</div>
      <div class="stat-value" id="statEnriched">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">胜率</div>
      <div class="stat-value" id="statWinRate">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均 PnL</div>
      <div class="stat-value" id="statAvgPnl">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">最好 / 最差</div>
      <div class="stat-value" id="statRange" style="font-size:14px;">—</div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg" style="display:none;"></div>

  <!-- Trade Tables -->
  <div class="trades-section" id="tradesSection" style="display:none;">
    <div class="trade-group winners">
      <h3>赢家组 🏆</h3>
      <div class="trade-list" id="winnersList"></div>
    </div>
    <div class="trade-group losers">
      <h3>亏损组 ⚠️</h3>
      <div class="trade-list" id="losersList"></div>
    </div>
  </div>

  <!-- Analysis -->
  <div class="analysis-card" id="analysisCard" style="display:none;">
    <h2>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
      </svg>
      Claude 自我复盘报告
    </h2>
    <div class="analysis-body" id="analysisBody"></div>
  </div>

  <!-- Empty state (initial) -->
  <div class="empty-state" id="emptyState">
    <div class="icon">📊</div>
    <p>选择时间段，点击「生成复盘」<br>Claude 会分析赢家/亏损的共同特征，并给出 Prompt 改进建议</p>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
  const API_BASE = "http://localhost:8000";
  let selectedDays = 7;

  // Period button toggle
  document.querySelectorAll(".period-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedDays = parseInt(btn.dataset.days);
    });
  });

  function fmt(val, digits = 1) {
    if (val === null || val === undefined) return "N/A";
    const n = parseFloat(val);
    return (n >= 0 ? "+" : "") + n.toFixed(digits) + "%";
  }

  function renderTrade(t) {
    const pnl = t.pnl_pct;
    const pnlCls = pnl >= 0 ? "pos" : "neg";
    const liveTag = t.pnl_source === "live" ? '<span class="live-tag">浮动</span>' : "";
    return `
      <div class="trade-item">
        <div class="trade-row1">
          <span class="trade-symbol">${t.symbol}${liveTag}</span>
          <span class="trade-pnl ${pnlCls}">${fmt(pnl)}</span>
        </div>
        <div class="trade-meta">
          信号: ${t.signal || "—"} | 置信度: ${t.confidence || "—"} |
          RSI: ${t.rsi || "—"} | 5d动量: ${fmt(t.momentum_5d)}
        </div>
        <div class="trade-meta">
          入场: $${t.fill_price?.toFixed(2) || "—"} →
          现价: $${t.current_price || "—"} |
          止损: $${t.stop_loss?.toFixed(2) || "—"} |
          目标: $${t.target_price?.toFixed(2) || "—"}
        </div>
        ${t.reason ? `<div class="trade-reason">${t.reason}</div>` : ""}
      </div>`;
  }

  async function generate() {
    const btn = document.getElementById("generateBtn");
    const btnText = document.getElementById("btnText");

    btn.disabled = true;
    btn.classList.add("loading");
    btnText.textContent = "分析中...";
    document.getElementById("emptyState").style.display = "none";
    document.getElementById("errorMsg").style.display = "none";

    try {
      const res = await fetch(`${API_BASE}/api/postmortem?days=${selectedDays}&top_n=3`);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const data = await res.json();

      // Stats
      const stats = data.stats || {};
      document.getElementById("statTotal").textContent     = data.total ?? "—";
      document.getElementById("statEnriched").textContent  = data.enriched ?? "—";

      const wrEl = document.getElementById("statWinRate");
      wrEl.textContent = stats.win_rate != null ? stats.win_rate + "%" : "—";
      wrEl.className = "stat-value " + (stats.win_rate >= 50 ? "pos" : "neg");

      const avgEl = document.getElementById("statAvgPnl");
      avgEl.textContent = stats.avg_pnl != null ? fmt(stats.avg_pnl) : "—";
      avgEl.className = "stat-value " + ((stats.avg_pnl ?? 0) >= 0 ? "pos" : "neg");

      document.getElementById("statRange").innerHTML =
        `<span class="pos">${fmt(stats.best_pnl)}</span> / <span class="neg">${fmt(stats.worst_pnl)}</span>`;

      document.getElementById("statsRow").style.display = "grid";

      // Trades
      if (data.winners?.length || data.losers?.length) {
        document.getElementById("winnersList").innerHTML =
          (data.winners || []).map(renderTrade).join("") || "<div class='trade-item' style='color:#484f58;text-align:center;padding:20px'>无数据</div>";
        document.getElementById("losersList").innerHTML =
          (data.losers  || []).map(renderTrade).join("") || "<div class='trade-item' style='color:#484f58;text-align:center;padding:20px'>无数据</div>";
        document.getElementById("tradesSection").style.display = "grid";
      }

      // Analysis
      if (data.analysis) {
        const body = document.getElementById("analysisBody");
        // Render markdown-ish headers
        body.innerHTML = data.analysis
          .replace(/^## (.+)$/gm, '<h2>$1</h2>')
          .replace(/^### (.+)$/gm, '<h3>$1</h3>')
          .replace(/\n/g, '\n');
        document.getElementById("analysisCard").style.display = "block";
      }

      // Footer
      const ts = new Date(data.generated_at);
      document.getElementById("lastGenTime").textContent = "生成于 " + ts.toLocaleTimeString("zh-CN");
      document.getElementById("footer").textContent = `报告覆盖过去 ${data.days} 天 | ${data.total} 笔交易 | 数据截至 ${ts.toLocaleDateString("zh-CN")}`;

      if (data.error) {
        const errEl = document.getElementById("errorMsg");
        errEl.textContent = "⚠ " + data.error;
        errEl.style.display = "block";
      }

    } catch (err) {
      const errEl = document.getElementById("errorMsg");
      errEl.textContent = "请求失败：" + err.message + "（确认后端 localhost:8000 是否运行）";
      errEl.style.display = "block";
      document.getElementById("emptyState").style.display = "block";
    }

    btn.disabled = false;
    btn.classList.remove("loading");
    btnText.textContent = "重新生成";
  }
</script>
</body>
</html>
